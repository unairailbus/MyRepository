<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3498db">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{margin:0;background:#f2f2f2;font-family:Arial;display:flex;justify-content:center;}
#app{width:100%;max-width:360px;min-height:100vh;background:white;padding:20px;box-sizing:border-box;}
.header-container{display:flex;align-items:center;padding-left:10px;margin-bottom:25px;}
.cart-icon{width:34px;height:34px;background:#3498db;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:12px;color:white;}
h1{margin:0;font-size:24px;}
.input-row{display:flex;align-items:center;gap:8px;padding-right:10px;}
.input-row input{flex:1;padding:10px;font-size:16px;}
button{width:40px;height:40px;padding:0;font-size:16px;font-weight:bold;cursor:pointer;border:none;color:white;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.addBtn,.doneBtn.active,.historyAdd{background:#2ecc71;}
.shareBtn{background:#3498db;}
.doneBtn{background:#cccccc;color:#555;}
.deleteBtn,.historyDelete{background:#e74c3c;}
.historyDelete{font-size:11px;}
.doneBtn,.historyAdd{margin-right:5px;}
.addBtn{font-size:22px;}
ul{list-style:none;padding:0;}
li{background:#fafafa;margin:6px 0;padding:10px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;}
.buttonGroup{display:flex;align-items:center;}
.historyItem{background:#eaeaea;color:#333;}
.sectionHeader{display:flex;justify-content:space-between;align-items:center;padding-right:10px;}
</style>
</head>

<body>
<div id="app">
  <div class="header-container">
    <div class="cart-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
    </div>
    <h1>List</h1>
  </div>

  <div class="input-row">
    <input id="itemInput" placeholder="Add item" onkeydown="if(event.key==='Enter') addItem()">
    <button class="addBtn" onclick="addItem()">+</button>
  </div>

  <div class="sectionHeader">
    <h3>Your List</h3>
    <button class="shareBtn" onclick="shareList()" title="Share list">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
    </button>
  </div>

  <ul id="list"></ul>

  <div class="sectionHeader">
    <h3>History</h3>
    <button onclick="askAI()" style="background:linear-gradient(135deg,#4285F4,#8A2BE2,#E91E8C);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:bold;cursor:pointer;">Ask AI</button>
  </div>
  <ul id="history"></ul>

</div>

<script>

let groceryList = JSON.parse(localStorage.getItem("groceryList")) || []
let historyList = JSON.parse(localStorage.getItem("historyList")) || []

function render(){
  const list = document.getElementById("list")
  const history = document.getElementById("history")
  list.innerHTML = ""
  history.innerHTML = ""

  groceryList.forEach((item, index) => {
    const li = document.createElement("li")
    li.innerHTML = `
      <span>${item}</span>
      <div class="buttonGroup">
        <button class="doneBtn" onclick="toggleDone(this)">✓</button>
        <button class="deleteBtn" onclick="moveToHistory(${index})">↓</button>
      </div>`
    list.appendChild(li)
  })

  historyList.forEach((item, index) => {
    const li = document.createElement("li")
    li.className = "historyItem"
    li.innerHTML = `
      <span>${item}</span>
      <div class="buttonGroup">
        <button class="historyAdd" onclick="copyToList(${index})">↑</button>
        <button class="historyDelete" onclick="deleteHistory(${index})">X</button>
      </div>`
    history.appendChild(li)
  })

  localStorage.setItem("groceryList", JSON.stringify(groceryList))
  localStorage.setItem("historyList", JSON.stringify(historyList))
}

function addItem(){
  const input = document.getElementById("itemInput")
  const item = input.value.trim()
  if(item === "") return
  groceryList.push(item)
  input.value = ""
  render()
}

function moveToHistory(index){
  const item = groceryList.splice(index, 1)[0]
  historyList.unshift(item)
  render()
}

function copyToList(index){
  const item = historyList.splice(index, 1)[0]
  groceryList.push(item)
  render()
}

function deleteHistory(index){
  historyList.splice(index, 1)
  render()
}

function toggleDone(button){
  button.classList.toggle("active")
}

function copyAllHistory(){
  if(historyList.length === 0){ alert("Your history is empty!"); return }
  const text = "Act as a nutritionist. Based on a healthy diet index, give a score (0-10) to each food item listed below and provide an overall average. Exclude nonfood items, do not explain the exclusion. Do not add any additional information. Strictly provide your entire response in the same language as the list items.\n\n" + historyList.map(item => "• " + item).join("\n")
  navigator.clipboard.writeText(text)
    .then(() => alert("Hurray!! List copied, push Ask AI"))
    .catch(() => alert("Could not copy to clipboard."))
}

async function askAI(){
  if(historyList.length === 0){ alert("Your history is empty!"); return }
  const text = "Act as a nutritionist. Based on a healthy diet index, give a score (0-10) to each food item listed below and provide an overall average. Exclude nonfood items, do not explain the exclusion. Do not add any additional information. Strictly provide your entire response in the same language as the list items.\n\n" + historyList.map(item => "• " + item).join("\n")
  try {
    await navigator.clipboard.writeText(text)
    alert("Ask AI, PASTE message to: gemini.google.com")
  } catch(e) {
    alert("Could not copy to clipboard. Please copy manually.")
  }
  window.open('https://gemini.google.com/', '_blank')
}

async function shareHistory(){
  if(historyList.length === 0){ alert("Your history is empty!"); return }
  const text = "Act as a nutritionist. Based on a healthy diet index, give a score (0-10) to each food item listed below and provide an overall average. Exclude nonfood items, do not explain the exclusion. Do not add any additional information. Strictly provide your entire response in the same language as the list items.\n\n" + historyList.map(item => "• " + item).join("\n")
  if(navigator.share){
    try { await navigator.share({ text }) }
    catch(e){ if(e.name !== "AbortError") fallbackCopy(text) }
  } else { fallbackCopy(text) }
}

async function shareList(){
  if(groceryList.length === 0){ alert("Your list is empty!"); return }
  const text = "🛒 List\n\n" + groceryList.map(item => "• " + item).join("\n")
  if(navigator.share){
    try { await navigator.share({ text }) }
    catch(e){ if(e.name !== "AbortError") fallbackCopy(text) }
  } else { fallbackCopy(text) }
}

function fallbackCopy(text){
  navigator.clipboard.writeText(text)
    .then(() => alert("List copied to clipboard!"))
    .catch(() => alert("Sharing not supported on this device."))
}

render()

</script>
</body>
</html>
